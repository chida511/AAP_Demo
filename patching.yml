---
- name: Enterprise RHEL Patching with Pre/Post Validation
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    log_file: "/var/log/patching_{{ inventory_hostname }}.log"

  tasks:

  # =========================
  # PRE-CHECKS
  # =========================

  - name: Create log file header
    copy:
      dest: "{{ log_file }}"
      content: |
        ================================
        PATCHING STARTED: {{ ansible_date_time.iso8601 }}
        Host: {{ inventory_hostname }}
        ================================

  - name: Capture system facts summary
    copy:
      dest: "{{ log_file }}"
      content: |
        Uptime: {{ ansible_uptime_seconds }} seconds
        Kernel: {{ ansible_kernel }}
        OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
      mode: append

  - name: Check disk usage
    shell: df -h
    register: disk_out

  - name: Append disk usage to log
    copy:
      dest: "{{ log_file }}"
      content: |
        ---- DISK USAGE ----
        {{ disk_out.stdout }}
      mode: append

  - name: Check available security updates
    command: yum updateinfo list security
    register: sec_updates
    changed_when: false
    failed_when: false

  - name: Log security updates
    copy:
      dest: "{{ log_file }}"
      content: |
        ---- SECURITY UPDATES ----
        {{ sec_updates.stdout }}
      mode: append

  # =========================
  # PATCHING
  # =========================

  - name: Clean metadata cache
    dnf:
      update_cache: yes

  - name: Apply full system updates
    dnf:
      name: "*"
      state: latest
      update_only: yes

  # =========================
  # REBOOT DETECTION
  # =========================

  - name: Check if reboot is required
    command: needs-restarting -r
    register: reboot_check
    failed_when: false
    changed_when: false

  - name: Set reboot flag
    set_fact:
      reboot_required: "{{ reboot_check.rc != 0 }}"

  # =========================
  # REBOOT
  # =========================

  - name: Reboot system if required
    reboot:
      reboot_timeout: 1800
      test_command: uptime
    when: reboot_required

  # =========================
  # POST-CHECKS
  # =========================

  - name: Validate kernel after patch
    command: uname -r
    register: kernel_after
    changed_when: false

  - name: Check system health
    command: systemctl is-system-running
    register: system_health
    failed_when: false
    changed_when: false

  - name: Final system validation
    copy:
      dest: "{{ log_file }}"
      content: |
        ================================
        PATCHING COMPLETED: {{ ansible_date_time.iso8601 }}

        Kernel After: {{ kernel_after.stdout }}
        System Health: {{ system_health.stdout }}
        Reboot Performed: {{ reboot_required }}
        ================================
      mode: append
