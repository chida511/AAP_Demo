---
- name: Enterprise RHEL Patching with Safe Logging & Validation
  hosts: all
  become: yes
  gather_facts: yes
  any_errors_fatal: true

  vars:
    log_file: "/var/log/patching_{{ inventory_hostname }}.log"

  tasks:

  # =========================
  # PRE-CHECKS
  # =========================

  - name: Initialize patch log
    copy:
      dest: "{{ log_file }}"
      content: |
        =====================================
        PATCHING STARTED: {{ ansible_date_time.iso8601 }}
        HOST: {{ inventory_hostname }}
        =====================================

  - name: Collect system baseline info
    blockinfile:
      path: "{{ log_file }}"
      block: |
        Uptime (seconds): {{ ansible_facts['uptime_seconds'] | default('N/A') }}
        Kernel: {{ ansible_facts['kernel'] }}
        OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}

  - name: Check disk usage
    command: df -h
    register: disk_out
    changed_when: false

  - name: Log disk usage
    blockinfile:
      path: "{{ log_file }}"
      block: |
        ----- DISK USAGE -----
        {{ disk_out.stdout }}

  - name: Check security updates
    command: dnf updateinfo list security
    register: sec_updates
    changed_when: false
    failed_when: false

  - name: Log security updates
    blockinfile:
      path: "{{ log_file }}"
      block: |
        ----- SECURITY UPDATES -----
        {{ sec_updates.stdout }}

  # =========================
  # PATCHING
  # =========================

  - name: Refresh DNF cache
    dnf:
      update_cache: yes

  - name: Apply all system updates
    dnf:
      name: "*"
      state: latest
    register: patch_result

  - name: Fail if patching failed
    fail:
      msg: "Patch installation failed on {{ inventory_hostname }}"
    when: patch_result is failed

  # =========================
  # REBOOT CHECK
  # =========================

  - name: Check if reboot required
    command: needs-restarting -r
    register: reboot_check
    failed_when: false
    changed_when: false

  - name: Set reboot flag
    set_fact:
      reboot_required: "{{ reboot_check.rc != 0 }}"

  - name: Reboot system if required
    reboot:
      reboot_timeout: 1800
      test_command: uptime
    when: reboot_required

  # =========================
  # POST-CHECKS
  # =========================

  - name: Verify kernel after patch
    command: uname -r
    register: kernel_after
    changed_when: false

  - name: Check system health
    command: systemctl is-system-running
    register: system_health
    changed_when: false
    failed_when: false

  - name: Final log entry
    blockinfile:
      path: "{{ log_file }}"
      block: |
        =====================================
        PATCHING COMPLETED: {{ ansible_date_time.iso8601 }}
        Kernel After: {{ kernel_after.stdout }}
        System Health: {{ system_health.stdout }}
        Reboot Performed: {{ reboot_required }}
        =====================================
