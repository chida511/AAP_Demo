---
- name: RHEL Subscription Registration Playbook
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    report_dir: "/var/tmp{{ ansible_date_time.date }}"

  tasks:

    - name: Create temp directory
      file:
        path: "{{ report_dir }}"
        state: directory
        mode: '0755'

    - name: Check if system is already registered
      command: subscription-manager identity
      register: reg_check
      failed_when: false
      changed_when: false

    - name: Register system if not registered (AAP Vault)
      command: >
        subscription-manager register
        --username {{ rh_username }}
        --password {{ rh_password }}
        --auto-attach
      when: reg_check.rc != 0
      register: reg_result

    - name: Verify registration
      command: subscription-manager identity
      register: identity
      changed_when: false

    - name: Show registration result (no file storage)
      debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Status: SUCCESS"
          - "{{ identity.stdout }}"

    - name: Fail if registration failed
      fail:
        msg: "Subscription registration failed for {{ inventory_hostname }}"
      when: identity.rc != 0
